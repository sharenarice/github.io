<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharena's Arenas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Karla',sans-serif;
  background:#11241D;
  color:#dcefe8;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  padding:1.25rem 2rem .75rem;
  border-bottom:0.5px solid rgba(220,239,232,0.15);
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-shrink:0;
}
h1{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;
  font-weight:500;
  letter-spacing:-0.01em;
  color:#dcefe8;
  line-height:1;
}
h1 em{color:#F0C318;font-style:italic;font-weight:400}
.subtitle{
  font-size:.72rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(220,239,232,0.85);
  margin-top:.35rem;
}
.legend-bar{
  display:flex;
  gap:1.25rem;
  font-size:.72rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:rgba(220,239,232,0.85);
  flex-wrap:wrap;
  justify-content:flex-end;
}
.leg{display:flex;align-items:center;gap:.4rem}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

main{
  flex:1;
  display:grid;
  grid-template-columns:1fr 360px;
  min-height:0;
}

#graph-container{
  position:relative;
  overflow:hidden;
  background:radial-gradient(ellipse at center,#173428 0%,#11241D 75%);
}
svg{width:100%;height:100%;display:block;cursor:grab}
svg:active{cursor:grabbing}

.link{stroke:rgba(220,239,232,0.45);stroke-width:1.2;fill:none;transition:stroke .2s, stroke-width .2s, opacity .2s}
.link.hub{stroke:rgba(240,195,24,0.65);stroke-width:1.8}
.link.highlighted{stroke:#F0C318;stroke-width:2.5;opacity:1}
.link.faded{opacity:.1}

.node{cursor:pointer}
.node circle{transition:r .2s, stroke-width .2s, filter .2s, opacity .2s}
.node:hover circle{filter:brightness(1.15)}
.node.selected circle{stroke-width:3}
.node.faded{opacity:.3}
.node text{
  font-family:'Karla',sans-serif;
  font-weight:600;
  fill:#ffffff;
  pointer-events:none;
  text-anchor:middle;
  dominant-baseline:middle;
}
.node .node-label{font-size:11px}
.node.hub .node-label{font-size:12px;font-weight:700;fill:#11241D}
.node.large .node-label{font-size:11.5px;font-weight:600}

.n-self{fill:#F0C318;stroke:#F0C318}
.n-employer{fill:#ffffff;stroke:#ffffff}
.n-venture{fill:#5d30d4;stroke:#b5a5f0}
.n-publishing{fill:#1a4780;stroke:#9fc0e8}
.n-philanthropy{fill:#E85D24;stroke:#ffb08a}
.n-work{fill:#1a3d2e;stroke:#a8d862}
.n-past{fill:#11241D;stroke:rgba(220,239,232,0.55);stroke-dasharray:3 2}

.node.hub .node-label{fill:#11241D}
.node.employer .node-label{fill:#11241D}
.node circle{stroke-width:2}

#panel{
  background:#061410;
  border-left:1px solid rgba(220,239,232,0.3);
  padding:1.5rem 1.75rem;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}
#panel::-webkit-scrollbar{width:6px}
#panel::-webkit-scrollbar-thumb{background:rgba(220,239,232,0.3);border-radius:3px}

.panel-placeholder{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:1.05rem;
  color:rgba(220,239,232,0.85);
  line-height:1.65;
  margin-top:2rem;
}
.panel-placeholder::before{
  content:'';
  display:block;
  width:32px;
  height:2px;
  background:#F0C318;
  margin-bottom:1rem;
}

.detail-category{
  font-size:.65rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#F0C318;
  margin-bottom:.5rem;
  font-weight:500;
}
.detail-name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.65rem;
  font-weight:500;
  color:#ffffff;
  line-height:1.15;
  margin-bottom:.35rem;
}
.detail-role{
  font-size:.85rem;
  color:rgba(220,239,232,0.9);
  margin-bottom:1.25rem;
  font-style:italic;
  line-height:1.5;
}
.detail-notable{
  font-size:.88rem;
  color:#f5faf7;
  line-height:1.7;
  padding:.9rem 1rem;
  background:rgba(240,195,24,0.1);
  border-left:3px solid #F0C318;
  margin-bottom:1.25rem;
}
.detail-connections{
  margin-top:auto;
  padding-top:1rem;
  font-size:.72rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:rgba(220,239,232,0.7);
}
.conn-chips{
  display:flex;
  flex-wrap:wrap;
  gap:.35rem;
  margin-top:.6rem;
}
.conn-chip{
  font-size:.76rem;
  padding:.32rem .65rem;
  background:rgba(220,239,232,0.15);
  border-radius:3px;
  letter-spacing:0;
  text-transform:none;
  color:#ffffff;
  cursor:pointer;
  transition:background .15s, color .15s;
  font-weight:500;
}
.conn-chip:hover{background:rgba(240,195,24,0.3);color:#F0C318}

.controls{
  position:absolute;
  bottom:1rem;
  left:1rem;
  display:flex;
  gap:.5rem;
  z-index:5;
}
.ctrl-btn{
  background:rgba(17,36,29,0.85);
  border:0.5px solid rgba(220,239,232,0.2);
  color:rgba(220,239,232,0.7);
  padding:.4rem .85rem;
  font-family:'Karla',sans-serif;
  font-size:.68rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:3px;
  transition:all .15s;
  backdrop-filter:blur(4px);
}
.ctrl-btn:hover{border-color:#F0C318;color:#F0C318}

.hint{
  position:absolute;
  bottom:1rem;
  right:1rem;
  font-size:.7rem;
  color:rgba(220,239,232,0.4);
  font-style:italic;
  z-index:5;
  font-family:'Cormorant Garamond',serif;
}

@media (max-width:900px){
  main{grid-template-columns:1fr;grid-template-rows:1fr auto}
  #panel{max-height:45vh;border-left:none;border-top:0.5px solid rgba(220,239,232,0.15)}
  header{flex-direction:column;align-items:flex-start;gap:.75rem}
  .legend-bar{justify-content:flex-start}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Sharena's <em>Arenas</em></h1>
    <div class="subtitle">An ecosystem map · April 2026</div>
  </div>
  <div class="legend-bar">
    <div class="leg"><div class="leg-dot" style="background:#F0C318"></div>Sharena</div>
    <div class="leg"><div class="leg-dot" style="background:#ffffff"></div>Employer</div>
    <div class="leg"><div class="leg-dot" style="background:#5d30d4"></div>Venture</div>
    <div class="leg"><div class="leg-dot" style="background:#1a4780;border:1px solid #9fc0e8"></div>Publishing</div>
    <div class="leg"><div class="leg-dot" style="background:#E85D24"></div>Philanthropy</div>
    <div class="leg"><div class="leg-dot" style="background:#1a3d2e;border:1px solid #a8d862"></div>Strategy work</div>
  </div>
</header>

<main>
  <div id="graph-container">
    <svg id="graph"></svg>
    <div class="controls">
      <button class="ctrl-btn" id="reset-btn">Reset view</button>
      <button class="ctrl-btn" id="center-btn">Center me</button>
    </div>
    <div class="hint">Drag · scroll · click</div>
  </div>
  <aside id="panel">
    <div class="panel-placeholder" id="placeholder">
      Click any node to see the story. Each connection here is a real relationship or a real piece of work. The center is me. The constellations around are the arenas.
    </div>
    <div id="detail" style="display:none;flex-direction:column;flex:1"></div>
  </aside>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const data = {
  nodes: [
    {id:'sharena', name:'Sharena Rice, PhD', cat:'self', size:'hub', role:'Neuroscientist · Quality engineer · Field architect', notable:'Focused on medical neurotech. Writes a lot. 14,500+ LinkedIn followers. Operating across quality, capital, and strategy layers simultaneously.'},

    {id:'sanmai', name:'Sanmai Technologies', cat:'employer', size:'large', role:'Senior Quality Engineer II · First full-time hire · Since May 2022', notable:'Neurotech Public Benefit Corporation working on focused ultrasound neuromodulation. Contributed to building quality management infrastructure as part of the Quality team. Two promotions to date. Prior titles: Research Scientist III, then Neurotechnologist and Science Communications Lead. Holds a provisional patent from this role. Works cross-functionally across Clinical, Product, and Engineering. Trained 6 clinical research sites on the technology.'},

    {id:'kaleida', name:'Kaleida Capital', cat:'venture', size:'large', role:'Venture Fellow · Since Oct 2025', notable:'NeuroAI investment thesis. Technical and scientific due diligence across portfolio candidates. Part of what got Astera Institute to invest came from a real conversation at Foresight with their internal champion. Carry-bound structure.'},

    {id:'neuradaptive', name:'Neuradaptive', cat:'work', size:'large', role:'Strategy Consultant · Since 2025', notable:'Neural implant company with ARPA-H funding from the FRONT program. Scoping a Q-sub and whitepaper as precursor to regulatory milestones.'},

    {id:'neurotech-reports', name:'Neurotech Reports', cat:'publishing', size:'large', role:'Contributing Editor · Since Nov 2022', notable:'28+ published articles on medical neurotechnology, bioelectronic medicine, and commercialization. Interview-based reporting on companies and research leaders across the field.'},

    {id:'brains-connected', name:'Brains Connected', cat:'publishing', size:'medium', role:'Contributing Editor', notable:'Content platform for consumer neurotechnology. Editorial contributions focused on where consumer-facing neurotech intersects with real clinical, ethical, and commercial considerations.'},

    {id:'standards-ref', name:'Neurotech Standards & Governance', cat:'self', size:'medium', role:'Curated reference for innovators · 2026', notable:'Co-produced reference resource mapping the standards bodies, regulators, and ethics initiatives that shape real-world neurotechnology deployment. Production by Audree Rumberger, Anna Riggs, and Sharena Rice. Developed in connection with BrainMind.'},

    {id:'foresight', name:'Foresight Institute', cat:'philanthropy', size:'medium', role:'Grant Advisor · Since 2024', notable:'Evaluate neurotechnology research and company proposals for scientific merit, structural viability, and long-term impact alignment. Fellowship application in development.'},



    {id:'mechanisms', name:'MECHANISMS', cat:'self', size:'large', role:'Structural canon · Published Easter Sunday 2026', notable:'120-page, five-volume structural diagnostic of medical neurotechnology. 55 named failure patterns. CC BY-NC-SA 4.0. Hosted at sharenarice.com. Engaged substantively by Kip Ludwig (UW-Madison) and other senior figures in the field within days of publication.'},

    {id:'neuronramp', name:'Neuronramp', cat:'self', size:'large', role:'Open source infrastructure and Substack · Launched April 2026', notable:'GitHub organization hosting educational tools, structural diagnostics, and interactive resources for medical neurotechnology. Also the name of my Substack. Domain owned. CC BY-NC-SA 4.0. Curated contributions only at launch.'},

    {id:'thresholds', name:'Thresholds', cat:'self', size:'medium', role:'Interactive game for undergraduates', notable:'Frictionless choose-your-own-adventure game. No email gate, no login required. Launched April 2026. Designed for classroom use and sharing across institutions.'},

    {id:'grad-game', name:'PhD Navigation Game', cat:'self', size:'medium', role:'Interactive scenario-based game for graduate students', notable:'Puts players inside the structural conditions that shape careers in neurotech research and beyond. Tested with grad students at UMich during the April 2026 speaking trip.'},

    {id:'website', name:'sharenarice.com', cat:'self', size:'medium', role:'Personal canonical home · GitHub Pages', notable:'Houses MECHANISMS, the CV, field resources, and major works. Moved from Netlify to GitHub Pages for better infrastructure control and public version history.'},

    {id:'brainmind', name:'BrainMind', cat:'philanthropy', size:'medium', role:'Member · Since 2023', notable:'Invitation-only community of neurotech investors, founders, and researchers. Attended Asilomar convening in 2026. Real relationships built here are with individuals rather than the institution itself.'},

    {id:'sxsw', name:'SXSW', cat:'past', size:'small', role:'Advisory Board · Former · 2022-2025', notable:'Medtech and psychedelic programming advisory. Former role. Tenure complete.'},

    {id:'clu-dorfman', name:'CLU Dorfman Center', cat:'past', size:'small', role:'Advisory Council · Former', notable:'Steven Dorfman Center for Innovation and Entrepreneurship at California Lutheran University. Former advisory role supporting undergraduate innovation and entrepreneurship programming at my alma mater.'},

    {id:'nobody-studios', name:'Nobody Studios', cat:'past', size:'small', role:'Former role · Venture studio', notable:'Venture studio. Former engagement. Tenure complete.'},

    {id:'holo-art', name:'Holo Art', cat:'past', size:'small', role:'Former involvement', notable:'Sent my art to space. Former involvement, not currently active.'},

    {id:'corundum', name:'Corundum Neuroscience', cat:'past', size:'small', role:'Contributing writer and moderator · Former', notable:'Wrote 3 articles for Corundum Neuroscience and moderated a panel during SXSW. Neurotech venture content and community. Former engagement.'},

    {id:'hawke', name:'Hawke Ventures', cat:'past', size:'small', role:'Fellow · Former · Brief engagement', notable:'Venture fellowship. Light involvement over a few months. Reconnected with the Hawke network during the April 2026 UMich trip.'},

    {id:'intvo', name:'Intvo', cat:'past', size:'medium', role:'Co-Founder / CSO · 2019-2021', notable:'Automotive software startup predicting pedestrian behavior. U.S. Provisional Patent on modular human behavior prediction. $237K in funding. Contracts with Volvo Cars, Denso, AEye. Returned all capital to investors.'},

    {id:'umich', name:'University of Michigan', cat:'past', size:'medium', role:'PhD Neuroscience · 2015-2021', notable:'Dissertation lab of Dr. Omar Ahmed. Novel interhemispheric oscillation characterized in Cell Reports (2022). T32 Training Grant. Rackham Merit Fellowship. Return visits as invited speaker: August 2025, April 2026.'},

    {id:'clu', name:'California Lutheran University', cat:'past', size:'small', role:'BA Biochemistry and Molecular Biology · 2011-2015', notable:'Highest Honors. University Honors Program President. Outstanding Young Alumni (2023).'}
  ],
  links: [
    {source:'sharena',target:'sanmai',strength:'strong'},
    {source:'sharena',target:'kaleida',strength:'strong'},
    {source:'sharena',target:'neuradaptive',strength:'strong'},
    {source:'sharena',target:'neurotech-reports',strength:'strong'},
    {source:'sharena',target:'brains-connected',strength:'medium'},
    {source:'sharena',target:'foresight',strength:'medium'},

    {source:'sharena',target:'mechanisms',strength:'strong'},
    {source:'sharena',target:'neuronramp',strength:'strong'},
    {source:'sharena',target:'thresholds',strength:'medium'},
    {source:'sharena',target:'grad-game',strength:'medium'},
    {source:'sharena',target:'standards-ref',strength:'medium'},
    {source:'sharena',target:'website',strength:'strong'},
    {source:'sharena',target:'brainmind',strength:'medium'},
    {source:'sharena',target:'sxsw',strength:'weak'},
    {source:'sharena',target:'clu-dorfman',strength:'medium'},
    {source:'sharena',target:'intvo',strength:'medium'},
    {source:'sharena',target:'umich',strength:'strong'},
    {source:'sharena',target:'clu',strength:'medium'},
    {source:'mechanisms',target:'website',strength:'strong'},
    {source:'mechanisms',target:'neuronramp',strength:'strong'},
    {source:'thresholds',target:'neuronramp',strength:'medium'},
    {source:'grad-game',target:'neuronramp',strength:'medium'},
    {source:'neuronramp',target:'website',strength:'medium'},
    {source:'standards-ref',target:'brainmind',strength:'strong'},
    {source:'standards-ref',target:'neuronramp',strength:'medium'},
    {source:'neurotech-reports',target:'brainmind',strength:'medium'},
    {source:'neurotech-reports',target:'brains-connected',strength:'strong'},
    {source:'sanmai',target:'brainmind',strength:'strong'},
    {source:'kaleida',target:'brainmind',strength:'weak'},
    {source:'sharena',target:'nobody-studios',strength:'weak'},
    {source:'sharena',target:'corundum',strength:'medium'},
    {source:'sharena',target:'hawke',strength:'weak'},
    {source:'corundum',target:'sxsw',strength:'medium'},
    {source:'sharena',target:'holo-art',strength:'weak'},
    {source:'clu',target:'clu-dorfman',strength:'strong'}
  ]
};

const svg = d3.select('#graph');
const container = document.getElementById('graph-container');
let width = container.clientWidth;
let height = container.clientHeight;

const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.4, 3])
  .on('zoom', (e) => g.attr('transform', e.transform));
svg.call(zoom);

const nodeRadius = (size, cat) => {
  if(cat === 'self' && size === 'hub') return 40;
  if(size === 'large') return 28;
  if(size === 'medium') return 20;
  return 14;
};

const simulation = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.links).id(d => d.id).distance(d => {
    if(d.strength === 'strong') return 140;
    if(d.strength === 'medium') return 190;
    return 230;
  }).strength(d => {
    if(d.strength === 'strong') return 0.6;
    if(d.strength === 'medium') return 0.35;
    return 0.15;
  }))
  .force('charge', d3.forceManyBody().strength(d => d.cat === 'self' && d.size === 'hub' ? -1600 : -650))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collide', d3.forceCollide().radius(d => nodeRadius(d.size, d.cat) + 14));

const link = g.append('g')
  .attr('class','links')
  .selectAll('line')
  .data(data.links)
  .enter().append('line')
  .attr('class', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return `link ${(s === 'sharena' || t === 'sharena') ? 'hub' : ''}`;
  });

const node = g.append('g')
  .attr('class','nodes')
  .selectAll('g')
  .data(data.nodes)
  .enter().append('g')
  .attr('class', d => `node ${d.cat === 'self' && d.size === 'hub' ? 'hub' : ''} ${d.size === 'large' ? 'large' : ''} ${d.cat === 'employer' ? 'employer' : ''}`)
  .call(d3.drag()
    .on('start', dragstart)
    .on('drag', dragged)
    .on('end', dragend));

node.append('circle')
  .attr('class', d => `n-${d.cat}`)
  .attr('r', d => nodeRadius(d.size, d.cat))
  .attr('stroke-width', 1.5);

node.each(function(d){
  const n = d3.select(this);
  const words = d.name.split(' ');
  const lines = [];

  if(d.cat === 'self' && d.size === 'hub'){
    lines.push('Sharena');
    lines.push('Rice, PhD');
  } else if(d.size === 'large' || d.size === 'medium'){
    let line1 = '', line2 = '';
    for(const w of words){
      if((line1 + ' ' + w).trim().length <= 13 && !line2){
        line1 = (line1 + ' ' + w).trim();
      } else {
        line2 = (line2 + ' ' + w).trim();
      }
    }
    if(line2){ lines.push(line1); lines.push(line2); }
    else lines.push(line1);
  } else {
    lines.push(d.name.length > 14 ? d.name.slice(0,13)+'…' : d.name);
  }

  const lineHeight = d.cat === 'self' && d.size === 'hub' ? 15 : 13;
  const startY = -(lines.length - 1) * lineHeight / 2;

  lines.forEach((l, i) => {
    n.append('text')
      .attr('class','node-label')
      .attr('y', startY + i * lineHeight)
      .text(l);
  });
});

let selected = null;

node.on('click', (e, d) => {
  e.stopPropagation();
  selectNode(d);
});

svg.on('click', () => {
  if(selected){
    selected = null;
    clearHighlights();
    document.getElementById('detail').style.display = 'none';
    document.getElementById('placeholder').style.display = 'block';
  }
});

function selectNode(d){
  selected = d;
  const connectedIds = new Set([d.id]);
  data.links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if(s === d.id) connectedIds.add(t);
    if(t === d.id) connectedIds.add(s);
  });

  node.classed('selected', n => n.id === d.id);
  node.classed('faded', n => !connectedIds.has(n.id));

  link.classed('highlighted', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s === d.id || t === d.id;
  });
  link.classed('faded', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s !== d.id && t !== d.id;
  });

  showDetail(d, connectedIds);
}

function clearHighlights(){
  node.classed('selected', false).classed('faded', false);
  link.classed('highlighted', false).classed('faded', false);
}

function showDetail(d, connectedIds){
  const connected = Array.from(connectedIds).filter(id => id !== d.id).map(id => data.nodes.find(n => n.id === id));
  const catLabels = {
    self:'Me and my work',
    employer:'Employer',
    venture:'Venture',
    publishing:'Publishing',
    philanthropy:'Philanthropy',
    work:'Strategy engagement',
    past:'Past · Formative'
  };

  const detail = document.getElementById('detail');
  const placeholder = document.getElementById('placeholder');
  placeholder.style.display = 'none';
  detail.style.display = 'flex';

  detail.innerHTML = `
    <div class="detail-category">${catLabels[d.cat] || d.cat}</div>
    <div class="detail-name">${d.name}</div>
    <div class="detail-role">${d.role}</div>
    <div class="detail-notable">${d.notable}</div>
    ${connected.length > 0 ? `
      <div class="detail-connections">
        Connected to
        <div class="conn-chips">
          ${connected.map(c => `<span class="conn-chip" data-id="${c.id}">${c.name}</span>`).join('')}
        </div>
      </div>
    ` : ''}
  `;

  detail.querySelectorAll('.conn-chip').forEach(chip => {
    chip.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = chip.getAttribute('data-id');
      const target = data.nodes.find(n => n.id === id);
      if(target) selectNode(target);
    });
  });
}

simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

function dragstart(event, d){
  if(!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d){
  d.fx = event.x; d.fy = event.y;
}
function dragend(event, d){
  if(!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

document.getElementById('reset-btn').addEventListener('click', () => {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  if(selected){
    selected = null;
    clearHighlights();
    document.getElementById('detail').style.display = 'none';
    document.getElementById('placeholder').style.display = 'block';
  }
});
document.getElementById('center-btn').addEventListener('click', () => {
  const me = data.nodes.find(n => n.id === 'sharena');
  if(me){
    selectNode(me);
    const t = d3.zoomIdentity.translate(width/2 - me.x, height/2 - me.y).scale(1);
    svg.transition().duration(500).call(zoom.transform, t);
  }
});

window.addEventListener('resize', () => {
  width = container.clientWidth;
  height = container.clientHeight;
  simulation.force('center', d3.forceCenter(width/2, height/2));
  simulation.alpha(0.3).restart();
});

setTimeout(() => {
  const me = data.nodes.find(n => n.id === 'sharena');
  if(me) selectNode(me);
}, 1000);
</script>
</body>
</html>
